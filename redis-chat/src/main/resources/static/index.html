<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Redis Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }

        #chat-box {
            height: 400px;
            border: 1px solid #ccc;
            overflow-y: scroll;
            padding: 10px;
            margin-bottom: 10px;
            background-color: #f9f9f9;
        }

        .message {
            padding: 5px;
            margin: 5px 0;
            background-color: #e1f5fe;
            border-radius: 5px;
        }

        input {
            padding: 10px;
            width: 70%;
        }

        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<h2>Chat</h2>

<!-- Benutzername eingeben -->
<input type="text" id="username" placeholder="Dein Name" />
<br><br>

<!-- Chat Nachrichten -->
<div id="chat-box"></div>

<!-- Nachricht schreiben -->
<input type="text" id="message-input" placeholder="Nachricht schreiben..." />
<button onclick="sendMessage()">Senden</button>

<script>
    // WebSocket Verbindung herstellen
    const socket = new WebSocket("ws://localhost:8080/ws/chat");

    // Nachricht empfangen
    socket.onmessage = function(event) {
        const chatBox = document.getElementById("chat-box");
        const message = document.createElement("div");
        message.classList.add("message");
        message.textContent = event.data;
        chatBox.appendChild(message);
        chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll
    };

    // Verbindung hergestellt
    socket.onopen = function() {
        console.log("WebSocket verbunden! ✅");
    };

    // Verbindung getrennt
    socket.onclose = function() {
        console.log("WebSocket getrennt!");
    };

    // Nachricht senden
    function sendMessage() {
        const username = document.getElementById("username").value;
        const message = document.getElementById("message-input").value;

        if (username && message) {
            socket.send(username + ": " + message);
            document.getElementById("message-input").value = ""; // Eingabe leeren
        } else {
            alert("Bitte Name und Nachricht eingeben!");
        }
    }

    // Enter-Taste zum Senden
    document.getElementById("message-input")
        .addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                sendMessage();
            }
        });
</script>

</body>
</html>
